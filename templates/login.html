<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portico Terminal - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: #0a0e17; color: #e2e8f0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }
        .login-box {
            background: #111827; border: 1px solid #1e293b; border-radius: 12px;
            padding: 40px; width: 380px; text-align: center;
        }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
        .logo-accent { color: #f97316; }
        .subtitle { color: #64748b; font-size: 13px; margin-bottom: 32px; }
        input[type="password"] {
            width: 100%; padding: 12px 16px; background: #1e293b; border: 1px solid #334155;
            border-radius: 8px; color: #e2e8f0; font-size: 14px;
            font-family: inherit; outline: none; margin-bottom: 16px;
        }
        input[type="password"]:focus { border-color: #f97316; }
        button {
            width: 100%; padding: 12px; background: linear-gradient(135deg, #f97316, #ea580c);
            border: none; border-radius: 8px; color: white; font-size: 14px;
            font-weight: 600; font-family: inherit; cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .error { color: #ef4444; font-size: 13px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <form class="login-box" method="POST" action="/login">
        <div class="logo"><span class="logo-accent">PORTICO</span> Terminal</div>
        <div class="subtitle">Enter password to continue</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <input type="password" name="password" placeholder="Password" autofocus required>
        <button type="submit">Login</button>
    </form>
</body>
</html>
